apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: catalogue-vpa
  namespace: e-commerce
spec:
  # The target workload to scale vertically
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: catalogue
  updatePolicy:
    # "Auto" will restart pods to resize them. Use "Off" if you only want suggestions without restarting.
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: catalogue
        minAllowed:
          cpu: "50m"
          memory: "100Mi"
        maxAllowed:
          cpu: "500m"
          memory: "500Mi"
        controlledResources: ["cpu", "memory"]
